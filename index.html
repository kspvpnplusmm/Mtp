<!DOCTYPE html>
<html lang="my">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>MTP | Admin Dashboard</title>
    <script src="https://html2canvas.hertzen.com/dist/html2canvas.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Pyidaungsu:wght@400;700&display=swap');

        :root {
            --bg: #0f172a;
            --card-bg: #1e293b;
            --primary: #38bdf8;
            --text: #f1f5f9;
            --text-dim: #94a3b8;
            --danger: #f43f5e;
            --success: #22c55e;
            --border: #334155;
        }

        * { box-sizing: border-box; }
        html, body { height: 100%; }
        body { font-family: 'Pyidaungsu', sans-serif; background: var(--bg); color: var(--text); margin: 0; display: flex; flex-direction: column; align-items: center; overflow: hidden; }
        #main-admin { width: 100%; max-width: 450px; height: 100dvh; display: flex; flex-direction: column; }

        /* Top (sticky) */
        #top-bar { flex-shrink: 0; padding: 16px 12px 10px; }

        /* Stats */
        .stats-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-bottom: 14px; }
        .stat-card { background: var(--card-bg); padding: 14px 5px; border-radius: 14px; text-align: center; border: 1px solid var(--border); }
        .stat-card i { font-size: 18px; margin-bottom: 8px; display: block; color: var(--primary); }
        .stat-card div { font-size: 20px; font-weight: bold; }
        .stat-card span { font-size: 10px; color: var(--text-dim); }

        /* Form */
        .panel { background: var(--card-bg); padding: 20px; border-radius: 16px; border: 1px solid var(--border); }
        .input-group { position: relative; margin-bottom: 12px; }
        .input-group i { position: absolute; left: 12px; top: 12px; color: #64748b; }
        .u-input { width: 100%; padding: 10px 10px 10px 35px; background: var(--bg); border: 1px solid var(--border); border-radius: 8px; color: white; box-sizing: border-box; font-family: inherit; }
        .u-input:focus { outline: none; border-color: var(--primary); }

        /* Date Shortcuts */
        .date-shortcuts { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; margin-bottom: 15px; }
        .btn-date { background: #334155; color: white; border: 1px solid #475569; padding: 8px; border-radius: 6px; cursor: pointer; font-size: 12px; transition: 0.2s; font-family: inherit; }
        .btn-date:hover { background: var(--primary); color: #0f172a; }

        .btn-main { width: 100%; padding: 12px; background: var(--primary); border: none; border-radius: 8px; color: #0f172a; font-weight: bold; font-family: inherit; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 8px; }

        /* List */
        .list-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 10px; padding: 0 2px; }
        .list-header h3 { margin: 0; font-size: 15px; color: var(--text); display: flex; align-items: center; gap: 8px; }
        .list-count { background: var(--card-bg); border: 1px solid var(--border); color: var(--text-dim); font-size: 12px; padding: 3px 10px; border-radius: 20px; }
        #list-scroll { flex: 1; overflow-y: auto; padding: 0 8px 90px; -webkit-overflow-scrolling: touch; }
        #user-list-container { display: grid; grid-template-columns: repeat(4, minmax(0, 1fr)); gap: 8px; }

        .user-card {
            background: var(--card-bg);
            padding: 10px 6px 8px;
            border-radius: 12px;
            border: 1px solid var(--border);
            border-top: 3px solid var(--success);
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
            gap: 5px;
            transition: 0.15s;
            min-width: 0;
        }
        .user-card.expired { border-top-color: var(--danger); opacity: 0.85; }
        .user-card:hover { border-color: #475569; }

        .user-avatar { width: 34px; height: 34px; flex-shrink: 0; border-radius: 50%; background: rgba(56,189,248,0.15); color: var(--primary); display: flex; align-items: center; justify-content: center; font-weight: bold; font-size: 14px; }
        .user-card.expired .user-avatar { background: rgba(244,63,94,0.15); color: var(--danger); }

        .user-info { min-width: 0; width: 100%; }
        .user-name { font-weight: bold; font-size: 12px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; width: 100%; }
        .user-id { font-size: 10px; color: var(--text-dim); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; width: 100%; margin-top: 1px; }

        .status-pill { font-size: 9px; font-weight: bold; padding: 3px 8px; border-radius: 20px; white-space: nowrap; display: inline-block; }
        .status-pill.active { background: rgba(34,197,94,0.18); color: var(--success); }
        .status-pill.expired { background: rgba(244,63,94,0.18); color: var(--danger); }

        .user-actions { display: flex; gap: 4px; justify-content: center; margin-top: 3px; }
        .btn-s {
            width: 26px; height: 26px; padding: 0; border-radius: 6px; border: none;
            cursor: pointer; color: white; font-size: 11px; flex-shrink: 0;
            display: flex; align-items: center; justify-content: center;
        }
        .btn-s:active { transform: scale(0.92); }

        .empty-state { grid-column: 1 / -1; text-align: center; color: #64748b; padding: 30px 10px; font-size: 13px; }

        /* FAB */
        .fab { position: fixed; bottom: 26px; right: calc(50% - 225px + 20px); width: 56px; height: 56px; border-radius: 50%; background: var(--primary); color: #0f172a; border: none; font-size: 22px; display: flex; align-items: center; justify-content: center; cursor: pointer; box-shadow: 0 8px 20px rgba(56,189,248,0.4); z-index: 20; }
        @media (max-width: 490px) { .fab { right: 20px; } }

        /* Modal */
        .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.6); display: none; align-items: flex-end; justify-content: center; z-index: 30; }
        .modal-overlay.active { display: flex; }
        .modal-sheet { width: 100%; max-width: 450px; max-height: 88vh; overflow-y: auto; background: var(--card-bg); border-radius: 20px 20px 0 0; padding: 20px; box-sizing: border-box; border: 1px solid var(--border); border-bottom: none; }
        .modal-head { display: flex; align-items: center; justify-content: space-between; margin-bottom: 14px; }
        .modal-head h3 { margin: 0; font-size: 16px; display: flex; align-items: center; gap: 8px; color: var(--primary); }
        .btn-close { background: #334155; border: none; color: white; width: 30px; height: 30px; border-radius: 50%; cursor: pointer; display: flex; align-items: center; justify-content: center; }

        /* ===== Slip (used only for image export, kept off-screen) ===== */
        #slip-export {
            position: fixed; top: -9999px; left: -9999px;
            width: 380px;
            background: #ffffff;
            border-radius: 24px;
            padding: 32px 28px 28px;
            border: 6px solid #38bdf8;
            font-family: 'Pyidaungsu', sans-serif;
            color: #1e1e1e;
            box-sizing: border-box;
        }
        .slip-title {
            font-size: 26px;
            font-weight: 700;
            color: #0284c7;
            margin-bottom: 20px;
            text-align: center;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }
        .slip-title i { font-size: 24px; }
        .slip-row {
            display: flex;
            justify-content: space-between;
            align-items: baseline;
            gap: 10px;
            margin: 0;
            padding: 14px 0;
            font-size: 16px;
            border-bottom: 1px solid #eceff3;
        }
        .slip-row:first-of-type { border-top: 1px solid #eceff3; }
        .slip-row span:first-child { color: #1e1e1e; }
        .slip-row span:last-child {
            font-weight: 700;
            color: #111827;
            text-align: right;
            word-break: break-all;
        }
        .slip-days {
            background: #e0f2fe;
            color: #0284c7;
            padding: 14px;
            text-align: center;
            border-radius: 40px;
            font-weight: 700;
            font-size: 20px;
            margin: 22px 0 16px;
        }
        .slip-days.expired { background: rgba(244,63,94,0.15); color: var(--danger); }
        .slip-thanks {
            text-align: center;
            color: #0284c7;
            font-weight: 700;
            font-size: 15px;
            margin: 0;
        }
    </style>
  </head>
  <body>
    <div id="main-admin">
      <div id="top-bar">
        <div class="stats-grid">
          <div class="stat-card">
            <i class="fas fa-users"></i>
            <div id="stat-total">0</div>
            <span>စုစုပေါင်း</span>
          </div>
          <div class="stat-card">
            <i class="fas fa-check-circle"></i>
            <div id="stat-active" style="color:var(--success)">0</div>
            <span>အသုံးပြုဆဲ</span>
          </div>
          <div class="stat-card">
            <i class="fas fa-times-circle"></i>
            <div id="stat-expired" style="color:var(--danger)">0</div>
            <span>ရက်ကုန်</span>
          </div>
        </div>
        <div class="list-header">
          <h3><i class="fas fa-list-ul" style="color:var(--primary)"></i> အသုံးပြုသူများ</h3>
          <span class="list-count" id="list-count">0 ဦး</span>
        </div>
        <div class="input-group" style="margin-bottom:0;">
          <i class="fas fa-search"></i>
          <input type="text" id="searchInput" class="u-input" placeholder="အသုံးပြုသူ ရှာရန်..." oninput="searchUsers()" />
        </div>
      </div>
      <div id="list-scroll">
        <div id="user-list-container"></div>
      </div>
    </div>
    <button class="fab" onclick="window.resetForm(); window.openModal();">
      <i class="fas fa-plus"></i>
    </button>
    <div class="modal-overlay" id="modalOverlay" onclick="if(event.target===this) window.closeModal();">
      <div class="modal-sheet">
        <div class="modal-head">
          <h3><i class="fas fa-user-plus"></i> အသုံးပြုသူ ထည့်/ပြင်ရန်</h3>
          <button class="btn-close" onclick="window.closeModal()"><i class="fas fa-times"></i></button>
        </div>
        <div class="panel" style="padding:0; border:none;">
          <div class="input-group">
            <i class="fas fa-key"></i>
            <input type="text" id="docId" class="u-input" placeholder="ID (သို့) Token" />
          </div>
          <div class="input-group">
            <i class="fas fa-user-edit"></i>
            <input type="text" id="username" class="u-input" placeholder="အသုံးပြုသူ အမည်" />
          </div>
          <div class="date-shortcuts">
            <button class="btn-date" onclick="setAutoDate(30)">1 လ</button>
            <button class="btn-date" onclick="setAutoDate(60)">2 လ</button>
            <button class="btn-date" onclick="setAutoDate(90)">3 လ</button>
            <button class="btn-date" onclick="setAutoDate(120)">4 လ</button>
            <button class="btn-date" onclick="setAutoDate(150)">5 လ</button>
            <button class="btn-date" onclick="setAutoDate(2)">2 ရက်</button>
          </div>
          <div class="input-group">
            <i class="fas fa-calendar-plus"></i>
            <input type="date" id="expiry" class="u-input" />
          </div>
          <button class="btn-main" onclick="saveAndDownload()">
            <i class="fas fa-save"></i> သိမ်းဆည်းမည်
          </button>
        </div>
      </div>
    </div>
    <div id="slip-export">
      <div class="slip-title"><i class="fas fa-crown"></i> MTP VIP ဝန်ဆောင်မှု</div>
      <div class="slip-row"><span>TOKEN ID:</span><span id="slip-id">...</span></div>
      <div class="slip-row"><span>နာမည်:</span><span id="slip-name">...</span></div>
      <div class="slip-row"><span>ကုန်ဆုံးရက်:</span><span id="slip-exp">...</span></div>
      <div class="slip-days" id="slip-days">0 ရက်ကျန်</div>
      <p class="slip-thanks">MTP ကို အသုံးပြုပေးလို့ ကျေးဇူးတင်ပါတယ်!</p>
    </div>
    <script type="module">
      import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, collection, doc, setDoc, onSnapshot, deleteDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCCXItwZPe2TgRPasdRcK7vNDsWxur7unE",
            authDomain: "mspvip-b3514.firebaseapp.com",
            projectId: "mspvip-b3514",
            storageBucket: "mspvip-b3514.firebasestorage.app",
            messagingSenderId: "973859172529",
            appId: "1:973859172529:android:048a1ec06110c25d527290"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const usersCol = collection(db, "users");
        let masterData = [];

        window.calculateDays = (exp) => {
            if(!exp) return 0;
            const diff = new Date(exp).setHours(0,0,0,0) - new Date().setHours(0,0,0,0);
            return Math.max(0, Math.ceil(diff / (1000 * 60 * 60 * 24)));
        };

        window.openModal = () => {
            document.getElementById('modalOverlay').classList.add('active');
        };

        window.closeModal = () => {
            document.getElementById('modalOverlay').classList.remove('active');
        };

        window.resetForm = () => {
            document.getElementById('docId').value = "";
            document.getElementById('username').value = "";
            document.getElementById('expiry').value = "";
        };

        window.setAutoDate = (d) => {
            const date = new Date(); date.setDate(date.getDate() + d);
            document.getElementById('expiry').value = date.toISOString().split('T')[0];
        };

        window.deleteUser = async (id) => {
            if(!confirm("ဒီအသုံးပြုသူကို ဖျက်မှာ သေချာပါသလား?")) return;
            try {
                await deleteDoc(doc(db, "users", id));
            } catch (err) {
                alert("ဖျက်ရာတွင် အမှားရှိနေပါသည်။");
                console.error(err);
            }
        };

        window.fillForm = (id, name, exp) => {
            document.getElementById('docId').value = id;
            document.getElementById('username').value = name;
            document.getElementById('expiry').value = exp;
            window.openModal();
        };

        window.saveAndDownload = async () => {
            const id = document.getElementById('docId').value.trim();
            const name = document.getElementById('username').value.trim();
            const exp = document.getElementById('expiry').value;
            if(id && name && exp) {
                await setDoc(doc(db, "users", id), { username: name, expiryDate: exp, isActive: true }, { merge: true });
                alert("သိမ်းဆည်းပြီးပါပြီ။");
                window.resetForm();
                window.closeModal();
            } else { alert("အချက်အလက်ဖြည့်ပါ။"); }
        };

        window.downloadSlip = async (id, name, exp) => {
            const days = window.calculateDays(exp);
            const isExpired = days <= 0;

            document.getElementById('slip-id').innerText = id;
            document.getElementById('slip-name').innerText = name;
            document.getElementById('slip-exp').innerText = exp || "...";
            const daysBox = document.getElementById('slip-days');
            daysBox.className = "slip-days" + (isExpired ? " expired" : "");
            daysBox.innerHTML = isExpired ? 'ကုန်ဆုံးပြီး' : days + ' ရက်ကျန်';

            const slipEl = document.getElementById('slip-export');
            try {
                const canvas = await html2canvas(slipEl, { backgroundColor: null, scale: 2 });
                const dataUrl = canvas.toDataURL('image/png');
                const link = document.createElement('a');
                link.href = dataUrl;
                link.download = `${name || 'user'}_slip.png`;
                document.body.appendChild(link);
                link.click();
                document.body.removeChild(link);
            } catch (err) {
                alert("ပုံ ထုတ်ရာတွင် အမှားရှိနေပါသည်။");
                console.error(err);
            }
        };

        window.searchUsers = () => {
            const val = document.getElementById('searchInput').value.toLowerCase();
            renderList(masterData.filter(u => u.id.toLowerCase().includes(val) || (u.username && u.username.toLowerCase().includes(val))));
        };

        onSnapshot(usersCol, (snap) => {
            masterData = snap.docs.map(d => ({ id: d.id, ...d.data() }));
            document.getElementById('stat-total').innerText = masterData.length;
            const active = masterData.filter(u => window.calculateDays(u.expiryDate) > 0).length;
            document.getElementById('stat-active').innerText = active;
            document.getElementById('stat-expired').innerText = masterData.length - active;
            renderList(masterData);
        });

        function renderList(list) {
            const container = document.getElementById("user-list-container");
            document.getElementById('list-count').innerText = `${list.length} ဦး`;
            container.innerHTML = "";

            if (list.length === 0) {
                container.innerHTML = `<div class="empty-state"><i class="fas fa-inbox" style="font-size:22px; display:block; margin-bottom:8px;"></i>အသုံးပြုသူ မတွေ့ပါ</div>`;
                return;
            }

            const sorted = [...list].sort((a, b) => window.calculateDays(a.expiryDate) - window.calculateDays(b.expiryDate));

            sorted.forEach(u => {
                const days = window.calculateDays(u.expiryDate);
                const isExpired = days <= 0;
                const initial = (u.username || "?").trim().charAt(0).toUpperCase();
                const div = document.createElement('div');
                div.className = "user-card" + (isExpired ? " expired" : "");
                div.innerHTML = `
                    <div class="user-avatar">${initial}</div>
                    <div class="user-info">
                        <div class="user-name">${u.username}</div>
                        <div class="user-id">ID: ${u.id}</div>
                    </div>
                    <span class="status-pill ${isExpired ? 'expired' : 'active'}">${isExpired ? 'ကုန်ဆုံးပြီး' : days + ' ရက်ကျန်'}</span>
                    <div class="user-actions">
                        <button class="btn-s" style="background:#3b82f6" onclick="window.fillForm('${u.id}','${u.username}','${u.expiryDate}')"><i class="fas fa-edit"></i></button>
                        <button class="btn-s" style="background:#22c55e" onclick="window.downloadSlip('${u.id}','${u.username}','${u.expiryDate}')"><i class="fas fa-download"></i></button>
                        <button class="btn-s" style="background:#f43f5e" onclick="window.deleteUser('${u.id}')"><i class="fas fa-trash"></i></button>
                    </div>`;
                container.appendChild(div);
            });
        }
    </script>
  </body>
</html>
